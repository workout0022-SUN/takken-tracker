  ["不動産登記法",103,"5/23","5/23","5/24","5/25","5/26","5/28","5/30","6/2","6/5","6/9","6/13","6/18","6/23","6/29","7/5","7/12","7/19"],
];
const COL_NAMES=["0","0.5","1-1","1-2","1-3","2-1","2-2","3-1","3-2","4-1","4-2","5-1","5-2","6-1","6-2","7-1","7-2"];
const REVIEW_ORDER=["7-2","7-1","6-2","6-1","5-2","5-1","4-2","4-1","3-2","3-1","2-2","2-1","1-3","1-2","1-1","0.5"];
const STORAGE_KEY="takken_all_records_v2";
const MARKS=[{val:"✓",color:"#16a34a",bg:"#dcfce7",border:"#16a34a"},{val:"✗",color:"#dc2626",bg:"#fee2e2",border:"#dc2626"},{val:"△",color:"#d97706",bg:"#fef3c7",border:"#d97706"}];
function toDate(s){const[m,d]=s.split("/").map(Number);return new Date(2026,m-1,d);}
function todayStr(){const n=new Date();return`${n.getMonth()+1}/${n.getDate()}`;}
function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");}catch{return{};}}
function save(r){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(r));}catch{}}
function recKey(section,q,c){return`${section}__${q}__${c}`;}
function getTasksForDate(dateStr){
  const tasks=[];
  RAW_DATA.forEach(row=>{const[section,qNum,...dates]=row;if(dates[0]===dateStr)tasks.push({section,qNum,colName:"0",isNew:true});});
  REVIEW_ORDER.forEach(colName=>{const ci=COL_NAMES.indexOf(colName);RAW_DATA.forEach(row=>{const[section,qNum,...dates]=row;if(dates[ci]===dateStr)tasks.push({section,qNum,colName,isNew:false});});});
  return tasks;
}
function getLateItems(records,selectedDate){
  const selD=toDate(selectedDate);const late={};
  RAW_DATA.forEach(row=>{const[section,qNum,...dates]=row;COL_NAMES.forEach((colName,ci)=>{if(!dates[ci])return;const d=toDate(dates[ci]);if(d<selD){const key=recKey(section,qNum,colName);if(!records[key]){const dStr=dates[ci];if(!late[dStr])late[dStr]=[];late[dStr].push({section,qNum,colName});}}});});
  return late;
}
function QuestionRow({section,qNum,colName,getRec,mark,accent}){
  const cur=getRec(section,qNum,colName);
  return(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",marginBottom:4,background:cur?(cur==="✓"?"#f0fdf4":cur==="✗"?"#fff5f5":"#fffbeb"):"#fff",borderRadius:8,border:`1px solid ${cur?(cur==="✓"?"#bbf7d0":cur==="✗"?"#fecaca":"#fde68a"):"#e2e8f0"}`,transition:"all 0.15s"}}>
    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
      <span style={{fontSize:9,color:"#fff",background:accent,borderRadius:4,padding:"1px 5px",fontWeight:700}}>{colName}</span>
      <span style={{fontSize:10,color:"#64748b"}}>{section}</span>
      <span style={{fontSize:14,fontWeight:700,color:"#1e293b"}}>問{qNum}</span>
    </div>
    <div style={{display:"flex",gap:4,flexShrink:0}}>
      {MARKS.map(m=>(<button key={m.val} onClick={()=>mark(section,qNum,colName,m.val)} style={{width:34,height:34,borderRadius:8,border:cur===m.val?`2px solid ${m.border}`:"1px solid #e2e8f0",background:cur===m.val?m.bg:"#f8fafc",color:cur===m.val?m.color:"#94a3b8",fontSize:14,fontWeight:700,cursor:"pointer"}}>{m.val}</button>))}
    </div>
  </div>);
}
function Section({title,accent,tasks,getRec,mark}){
  return(<div style={{marginBottom:16}}><div style={{fontSize:12,fontWeight:700,color:accent,padding:"4px 10px",background:`${accent}18`,borderLeft:`3px solid ${accent}`,borderRadius:"0 6px 6px 0",marginBottom:6}}>{title}（{tasks.length}問）</div>{tasks.map(({section,qNum,colName})=>(<QuestionRow key={`${section}-${qNum}-${colName}`} section={section} qNum={qNum} colName={colName} getRec={getRec} mark={mark} accent={accent}/>))}</div>);
}
function LateView({lateItems,getRec,mark}){
  const dates=Object.keys(lateItems).sort((a,b)=>toDate(a)-toDate(b));
  if(dates.length===0)return(<div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8"}}><div style={{fontSize:32}}>✅</div><div style={{fontSize:14,marginTop:8}}>遅れはありません！</div></div>);
  return(<div>{dates.map(d=>(<div key={d} style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:"#dc2626",padding:"4px 10px",background:"#fee2e2",borderRadius:6,marginBottom:6,display:"inline-block"}}>🚨 {d}（未済 {lateItems[d].length}問）</div>{lateItems[d].map(({section,qNum,colName})=>(<QuestionRow key={`${section}-${qNum}-${colName}`} section={section} qNum={qNum} colName={colName} getRec={getRec} mark={mark} accent="#dc2626"/>))}</div>))}</div>);
}
function App(){
  const[records,setRecords]=useState({});
  const[selectedDate,setSelectedDate]=useState(todayStr());
  const[tab,setTab]=useState("today");
  const[saved,setSaved]=useState(false);
  const[toast,setToast]=useState("");
  const fileRef=useRef();
  useEffect(()=>{setRecords(load());},[]);
  const mark=useCallback((section,qNum,colName,val)=>{
    const key=recKey(section,qNum,colName);
    setRecords(prev=>{const next={...prev};if(prev[key]===val){delete next[key];}else{next[key]=val;}save(next);return next;});
    setSaved(true);setTimeout(()=>setSaved(false),1200);
  },[]);
  const exportData=()=>{
    const data=JSON.stringify(records,null,2);const blob=new Blob([data],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`takken_backup_${todayStr().replace("/","-")}.json`;a.click();URL.revokeObjectURL(url);
    setToast("💾 バックアップ保存完了！");setTimeout(()=>setToast(""),2000);
  };
  const importData=(e)=>{
    const file=e.target.files[0];if(!file)return;const reader=new FileReader();
    reader.onload=(ev)=>{try{const data=JSON.parse(ev.target.result);setRecords(data);save(data);setToast("📂 データ読込完了！");}catch{setToast("❌ 読込失敗");}setTimeout(()=>setToast(""),2000);};
    reader.readAsText(file);e.target.value="";
  };
  const getRec=(section,qNum,colName)=>records[recKey(section,qNum,colName)]||"";
  const tasks=getTasksForDate(selectedDate);
  const newTasks=tasks.filter(t=>t.isNew);
  const reviewTasks=tasks.filter(t=>!t.isNew);
  const doneTasks=tasks.filter(t=>getRec(t.section,t.qNum,t.colName));
  const correctTasks=tasks.filter(t=>getRec(t.section,t.qNum,t.colName)==="✓");
  const lateItems=getLateItems(records,selectedDate);
  const lateCount=Object.values(lateItems).flat().length;
  const DATE_LIST=[];
  const start=new Date(2026,3,1),end=new Date(2026,6,19);
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1))DATE_LIST.push(`${d.getMonth()+1}/${d.getDate()}`);
  return(
    <div style={{fontFamily:"'Hiragino Mincho ProN','Yu Mincho',serif",background:"#f6f4f0",minHeight:"100vh",userSelect:"none"}}>
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"#1e3a7a",color:"#fff",padding:"10px 20px",borderRadius:8,fontSize:13,fontWeight:700,zIndex:99,boxShadow:"0 2px 12px rgba(0,0,0,0.2)"}}>{toast}</div>}
      <div style={{background:"#eef3ff",borderBottom:"2px solid #3b6fd4",padding:"12px 16px 10px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:10,color:"#3b6fd4",letterSpacing:2,marginBottom:2}}>全科目対応 v2</div>
            <div style={{fontSize:17,fontWeight:700,color:"#1e3a7a"}}>棚田式トラッカー</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {saved&&<span style={{color:"#16a34a",fontSize:11}}>✓ 保存済</span>}
            <select value={selectedDate} onChange={e=>setSelectedDate(e.target.value)} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #3b6fd4",background:"#fff",color:"#1e3a7a",fontSize:13,fontFamily:"inherit"}}>
              {DATE_LIST.map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          </div>
        </div>
        {tasks.length>0&&(<div style={{marginTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#3b6fd4",marginBottom:3}}>
            <span>本日 {doneTasks.length}/{tasks.length} 完了</span>
            <span style={{color:"#16a34a"}}>✓{correctTasks.length} ✗{tasks.filter(t=>getRec(t.section,t.qNum,t.colName)==="✗").length}</span>
          </div>
          <div style={{background:"#c7d8f8",borderRadius:4,height:5}}><div style={{width:`${(doneTasks.length/tasks.length)*100}%`,height:"100%",background:"#3b6fd4",borderRadius:4,transition:"width 0.3s"}}/></div>
        </div>)}
        <div style={{display:"flex",gap:6,marginTop:10,alignItems:"center",flexWrap:"wrap"}}>
          {[{key:"today",label:"今日のタスク"},{key:"late",label:`遅れ${lateCount>0?` (${lateCount})`:""}`}].map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)} style={{padding:"5px 14px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",background:tab===t.key?"#3b6fd4":"#dde8fb",color:tab===t.key?"#fff":"#3b6fd4"}}>{t.label}</button>
          ))}
          <div style={{marginLeft:"auto",display:"flex",gap:6}}>
            <button onClick={exportData} style={{padding:"5px 10px",borderRadius:6,border:"1px solid #3b6fd4",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",background:"#fff",color:"#3b6fd4"}}>💾 バックアップ</button>
            <button onClick={()=>fileRef.current.click()} style={{padding:"5px 10px",borderRadius:6,border:"1px solid #7c3aed",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",background:"#fff",color:"#7c3aed"}}>📂 読込</button>
            <input ref={fileRef} type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
          </div>
        </div>
      </div>
      <div style={{padding:"12px 14px 40px"}}>
        {tab==="today"?(
          <div>
            {newTasks.length===0&&reviewTasks.length===0?(
              <div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8"}}><div style={{fontSize:32}}>📖</div><div style={{fontSize:14,marginTop:8}}>{selectedDate} はタスクなし</div></div>
            ):(
              <>{newTasks.length>0&&<Section title="🆕 新出" accent="#3b6fd4" tasks={newTasks} getRec={getRec} mark={mark}/>}{reviewTasks.length>0&&<Section title="🔔 復習" accent="#7c3aed" tasks={reviewTasks} getRec={getRec} mark={mark}/>}</>
            )}
          </div>
        ):(<LateView lateItems={lateItems} getRec={getRec} mark={mark}/>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
